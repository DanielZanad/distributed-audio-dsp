services:
  # message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: audio-broker
    ports:
      - "5672:5672"   # rabbitmq port
      - "15672:15672" # management ui
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # database
  postgres:
    image: postgres:16-alpine
    container_name: audio-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # node api 
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: audio-api
    ports:
      - "3000:3000"
    restart: on-failure
    environment:
      AUDIO_STORAGE_DRIVER: ${AUDIO_STORAGE_DRIVER:-r2}
      LOCAL_AUDIO_STORAGE_ROOT: ${LOCAL_AUDIO_STORAGE_ROOT:-/app/data}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3000}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://user:password@postgres:5432/audio_db
      CLOUDFLARE_ENDPOINT: ${CLOUDFLARE_ENDPOINT}
      CLOUDFLARE_ACCESS_KEY_ID: ${CLOUDFLARE_ACCESS_KEY_ID}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${CLOUDFLARE_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PRESIGNED_URL_TTL_SECONDS: ${R2_PRESIGNED_URL_TTL_SECONDS:-900}
      JWT_EXPIRES_IN: 1d
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jeager:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_SERVICE_NAME: audio_orchestrator
      OTEL_NODE_ENABLED_INSTRUMENTATIONS: http,express,pg,amqplib
    volumes:
      - ./backend:/app
      - audio_data:/app/data
    depends_on:
      - rabbitmq
      - postgres

  # rust worker (dsp engine)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: audio-worker
    restart: on-failure
    environment:
      AUDIO_STORAGE_DRIVER: ${AUDIO_STORAGE_DRIVER:-r2}
      LOCAL_AUDIO_STORAGE_ROOT: ${LOCAL_AUDIO_STORAGE_ROOT:-/app/data}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://user:password@postgres:5432/audio_db
      CLOUDFLARE_ENDPOINT: ${CLOUDFLARE_ENDPOINT}
      CLOUDFLARE_ACCESS_KEY_ID: ${CLOUDFLARE_ACCESS_KEY_ID}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${CLOUDFLARE_SECRET_ACCESS_KEY}
      TOKEN: ${TOKEN}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    volumes:
      - audio_data:/app/data
    depends_on:
      - rabbitmq
      - postgres

  # frontend web app
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: audio-web
    ports:
      - "5173:5173"
    restart: on-failure
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

  jeager:
    image: jaegertracing/all-in-one:1.57
    container_name: audio-jeager
    ports:
      - "6831:6831/udp"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"


volumes:
  audio_data:
  postgres_data:
